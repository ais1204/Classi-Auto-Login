<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classi 自動ログイン 設定</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
        width: 300px;
        margin: 0;
        padding: 16px;
        font-size: 14px;
        background: #fff;
        color: #1a1a1a;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 4px;
      }
      p.lead {
        margin: 0 0 14px;
        font-size: 12px;
        color: #666;
        line-height: 1.5;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin: 12px 0 4px;
      }
      input[type="email"],
      input[type="text"],
      input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 13px;
      }
      .row-check {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 8px;
        font-size: 12px;
        color: #555;
      }
      .row-check input {
        margin: 0;
      }
      button {
        width: 100%;
        margin-top: 16px;
        padding: 10px;
        border: 0;
        border-radius: 6px;
        background: #1a73e8;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #1666cf;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        text-align: center;
        min-height: 16px;
        color: #1a7f37;
        font-weight: 600;
      }
      .note {
        margin-top: 14px;
        font-size: 11px;
        color: #888;
        line-height: 1.5;
        border-top: 1px solid #eee;
        padding-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Classi 自動ログイン 設定</h1>
    <p class="lead">
      自動ログインに使うGoogleアカウントを登録してください。最初に一度だけ設定すればOKです。
    </p>

    <label for="email">メールアドレス</label>
    <input type="email" id="email" placeholder="例: 20227777@domain.jp" autocomplete="off" />

    <label for="password">パスワード（任意）</label>
    <input type="password" id="password" placeholder="空欄なら手入力に任せます" autocomplete="off" />

    <div class="row-check">
      <input type="checkbox" id="show" />
      <label for="show" style="margin: 0; font-weight: 400;">パスワードを表示</label>
    </div>

    <button id="save">保存する</button>
    <div id="status"></div>

    <div class="note">
      ・パスワードはこの端末のChrome内（拡張機能のストレージ）にのみ保存されます。<br />
      ・普段はGoogleのログインが生きているのでパスワードは不要なことが多いです。まずは空欄でお試しを。<br />
      ・2段階認証が表示された場合は手動操作になります。
    </div>

    <script src="popup.js"></script>
  </body>
</html>
